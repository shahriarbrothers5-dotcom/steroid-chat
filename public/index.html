<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f0f13" />
  <title>Steroid — Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --bg2: #18181f;
      --bg3: #1f1f2a;
      --bg4: #2a2a38;
      --accent: #7c5cfc;
      --accent2: #9b7dff;
      --danger: #e05c5c;
      --success: #4caf7d;
      --warn: #f0a034;
      --text: #e8e8f0;
      --text2: #9090b0;
      --border: #2e2e40;
      --msg-own: #2a2050;
      --sidebar-w: 260px;
      --members-w: 210px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    html { height: 100%; }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: calc(var(--vh, 1vh) * 100);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Auth Screen ─────────────────────────────── */
    #auth-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100%; padding: 16px;
      background: radial-gradient(ellipse at 50% 0%, #1e1040 0%, var(--bg) 70%);
    }

    .auth-box {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
      padding: 32px 28px; width: 100%; max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
    }

    .auth-logo { text-align: center; margin-bottom: 24px; }
    .auth-logo h1 {
      font-size: clamp(1.6rem, 5vw, 2rem); font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, #7c5cfc, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .auth-logo p { color: var(--text2); font-size: .85rem; margin-top: 4px; }

    .auth-tabs { display: flex; border-radius: 8px; background: var(--bg3); padding: 4px; margin-bottom: 20px; }
    .auth-tab {
      flex: 1; text-align: center; padding: 9px; border-radius: 6px; cursor: pointer;
      font-size: .9rem; font-weight: 600; color: var(--text2); transition: all .2s;
      user-select: none;
    }
    .auth-tab.active { background: var(--accent); color: #fff; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: .78rem; color: var(--text2); margin-bottom: 6px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .form-group input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 16px;
      outline: none; transition: border-color .2s; -webkit-appearance: none;
    }
    .form-group input:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer;
      font-size: .9rem; font-weight: 600; transition: all .2s;
      min-height: 44px; user-select: none; -webkit-appearance: none;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:active { filter: brightness(.9); transform: scale(.98); }
    .btn-sm { padding: 8px 16px; font-size: .82rem; min-height: 38px; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }

    .auth-error {
      background: rgba(224,92,92,.15); border: 1px solid rgba(224,92,92,.3);
      border-radius: 8px; padding: 10px 14px; font-size: .85rem; color: #e07070;
      margin-bottom: 14px; display: none;
    }

    /* ── App Shell ───────────────────────────────── */
    #app { display: none; height: 100%; position: relative; }
    #app.visible { display: flex; }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; z-index: 50;
      transition: transform .25s ease;
    }

    .sidebar-header {
      padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding-top: calc(16px + var(--safe-top));
    }
    .sidebar-logo {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #7c5cfc, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sidebar-close {
      display: none; background: none; border: none; cursor: pointer;
      color: var(--text2); font-size: 1.3rem; padding: 4px; min-height: 44px; min-width: 44px;
      align-items: center; justify-content: center; border-radius: 8px;
    }
    .sidebar-close:hover { color: var(--text); }

    .rooms-section { flex: 1; overflow-y: auto; padding: 8px 0; }
    .rooms-label { padding: 8px 16px 4px; font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); font-weight: 700; }

    .room-item {
      padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent;
      transition: all .15s; display: flex; align-items: center; gap: 10px;
      min-height: 52px;
    }
    .room-item:hover { background: var(--bg3); }
    .room-item.active { background: var(--bg3); border-left-color: var(--accent); }
    .room-name { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-code-label { font-size: .7rem; color: var(--text2); font-family: monospace; }

    .sidebar-actions { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-direction: column; }

    .user-bar {
      padding: 12px 14px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      padding-bottom: calc(12px + var(--safe-bottom));
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: .88rem; font-weight: 600; }
    .user-tag { font-size: .7rem; color: var(--text2); }
    .logout-btn {
      background: none; border: none; cursor: pointer; color: var(--text2);
      font-size: 1.1rem; padding: 8px; border-radius: 8px; min-width: 36px; min-height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .logout-btn:hover { color: var(--danger); }

    /* ── Sidebar overlay (mobile) ────────────────── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.55); z-index: 49;
    }
    .sidebar-overlay.visible { display: block; }

    /* ── Chat Area ───────────────────────────────── */
    .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); min-width: 0; overflow: hidden; }

    .chat-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; background: var(--bg2); flex-shrink: 0;
      padding-top: calc(12px + var(--safe-top));
    }
    .hamburger {
      display: none; background: none; border: none; cursor: pointer;
      color: var(--text2); font-size: 1.2rem; padding: 6px;
      min-width: 40px; min-height: 40px; align-items: center; justify-content: center;
      border-radius: 8px; flex-shrink: 0;
    }
    .hamburger:hover { color: var(--text); background: var(--bg4); }
    .chat-header-name { font-size: .95rem; font-weight: 700; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-header-code {
      font-size: .72rem; color: var(--text2); background: var(--bg4);
      padding: 3px 8px; border-radius: 999px; font-family: monospace; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    .chat-header-code:hover { color: var(--accent); }
    .chat-header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .chat-header-members { font-size: .78rem; color: var(--text2); white-space: nowrap; }
    .btn-members-toggle {
      display: none; background: none; border: none; cursor: pointer;
      color: var(--text2); font-size: 1rem; padding: 6px; border-radius: 8px;
      min-width: 36px; min-height: 36px; align-items: center; justify-content: center;
    }
    .btn-members-toggle:hover { color: var(--accent); background: var(--bg4); }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 3px; -webkit-overflow-scrolling: touch; }

    .msg { display: flex; align-items: flex-end; gap: 7px; max-width: 75%; }
    .msg.own { align-self: flex-end; flex-direction: row-reverse; }
    .msg.other { align-self: flex-start; }

    .msg-avatar {
      width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: .65rem; font-weight: 700; flex-shrink: 0;
    }
    .msg-bubble { background: var(--bg3); border-radius: 16px; padding: 8px 13px; max-width: 100%; word-break: break-word; }
    .msg.own .msg-bubble { background: var(--msg-own); border-bottom-right-radius: 4px; }
    .msg.other .msg-bubble { border-bottom-left-radius: 4px; }
    .msg-username { font-size: .7rem; color: var(--accent2); font-weight: 700; margin-bottom: 3px; }
    .msg-text { font-size: .88rem; line-height: 1.5; }
    .msg-time { font-size: .62rem; color: var(--text2); margin-top: 3px; text-align: right; }
    .msg.other .msg-time { text-align: left; }

    .msg-image { max-width: 240px; width: 100%; border-radius: 10px; display: block; cursor: pointer; }
    .msg-image:hover { opacity: .9; }

    .msg-file {
      display: flex; align-items: center; gap: 8px; text-decoration: none;
      background: var(--bg4); border-radius: 8px; padding: 8px 12px; color: var(--text);
    }
    .msg-file:hover { background: var(--border); }
    .msg-file-icon { font-size: 1.3rem; }
    .msg-file-name { font-size: .82rem; font-weight: 600; word-break: break-all; }
    .msg-link { display: flex; align-items: center; gap: 6px; color: var(--accent2); text-decoration: none; font-size: .88rem; word-break: break-all; }
    .msg-link:hover { text-decoration: underline; }

    .day-divider { display: flex; align-items: center; gap: 10px; color: var(--text2); font-size: .72rem; margin: 10px 0; }
    .day-divider::before, .day-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Chat Input */
    .chat-input-area {
      padding: 10px 14px; background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0;
      padding-bottom: calc(10px + var(--safe-bottom));
    }
    .attachment-preview {
      background: var(--bg3); border-radius: 8px; padding: 7px 10px; margin-bottom: 8px;
      display: none; align-items: center; gap: 8px;
    }
    .attachment-preview.visible { display: flex; }
    .attachment-preview-name { flex: 1; font-size: .82rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .attachment-remove { background: none; border: none; cursor: pointer; color: var(--danger); font-size: .95rem; padding: 4px; min-width: 28px; min-height: 28px; }

    .input-row { display: flex; align-items: flex-end; gap: 6px; }
    .input-actions { display: flex; gap: 2px; }
    .input-action {
      background: none; border: none; cursor: pointer; color: var(--text2);
      font-size: 1.05rem; padding: 8px; border-radius: 8px; transition: all .15s;
      min-width: 38px; min-height: 38px; display: flex; align-items: center; justify-content: center;
    }
    .input-action:hover { color: var(--accent); background: var(--bg4); }

    .msg-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
      padding: 9px 14px; color: var(--text); font-size: 16px; outline: none;
      resize: none; max-height: 120px; line-height: 1.5; font-family: inherit;
      transition: border-color .2s; -webkit-appearance: none;
    }
    .msg-input:focus { border-color: var(--accent); }
    .msg-input::placeholder { color: var(--text2); }

    .send-btn {
      background: var(--accent); border: none; cursor: pointer; color: #fff;
      width: 40px; height: 40px; border-radius: 10px; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
      flex-shrink: 0; -webkit-appearance: none;
    }
    .send-btn:hover { background: var(--accent2); }
    .send-btn:disabled { opacity: .4; cursor: default; }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; color: var(--text2); padding: 24px; text-align: center;
    }
    .empty-icon { font-size: 3rem; }
    .empty-title { font-size: 1.15rem; font-weight: 700; color: var(--text); }
    .empty-sub { font-size: .85rem; max-width: 260px; line-height: 1.6; }

    /* ── Members Panel ───────────────────────────── */
    .members-panel {
      width: var(--members-w); background: var(--bg2); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .members-panel-header {
      padding: 14px 14px 10px; border-bottom: 1px solid var(--border);
      font-size: .7rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text2); font-weight: 700;
      padding-top: calc(14px + var(--safe-top));
    }
    .members-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .member-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      transition: background .15s; min-height: 44px;
    }
    .member-item:hover { background: var(--bg3); }
    .member-avatar {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: .68rem; font-weight: 700; flex-shrink: 0;
    }
    .member-name { flex: 1; font-size: .83rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .member-you { font-size: .68rem; color: var(--text2); }
    .call-btn {
      background: none; border: none; cursor: pointer; color: var(--text2);
      font-size: .9rem; padding: 5px; border-radius: 6px; transition: all .15s;
      min-width: 32px; min-height: 32px; display: flex; align-items: center; justify-content: center;
    }
    .call-btn:hover { color: var(--success); background: rgba(76,175,125,.15); }
    .members-empty { padding: 14px 12px; font-size: .82rem; color: var(--text2); }

    /* Members sheet on mobile */
    .members-sheet {
      display: none; position: fixed; inset: 0; z-index: 80;
      flex-direction: column;
    }
    .members-sheet.visible { display: flex; }
    .members-sheet-backdrop { flex: 1; background: rgba(0,0,0,.5); }
    .members-sheet-panel {
      background: var(--bg2); border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0; max-height: 60%;
      display: flex; flex-direction: column;
      padding-bottom: var(--safe-bottom);
    }
    .members-sheet-handle {
      width: 36px; height: 4px; background: var(--border); border-radius: 2px;
      margin: 10px auto 6px;
    }
    .members-sheet-title {
      padding: 4px 16px 10px; font-size: .75rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text2); font-weight: 700;
      border-bottom: 1px solid var(--border);
    }
    .members-sheet-list { overflow-y: auto; padding: 6px 0; }

    /* ── Modal ───────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      display: none; align-items: flex-end; justify-content: center; z-index: 100;
      padding: 0; padding-bottom: var(--safe-bottom);
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px 16px 0 0; padding: 24px 20px;
      width: 100%; max-width: 480px;
      box-shadow: 0 -12px 40px rgba(0,0,0,.4);
    }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .modal-actions .btn { flex: 1; }

    /* ── Incoming Call ───────────────────────────── */
    #incoming-call-modal .modal { text-align: center; padding: 28px 20px; }
    .call-pulse {
      width: 64px; height: 64px; border-radius: 50%; background: var(--success);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; margin: 0 auto 16px;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(76,175,125,.5); }
      50%      { box-shadow: 0 0 0 16px rgba(76,175,125,0); }
    }
    .incoming-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .incoming-sub { color: var(--text2); font-size: .85rem; margin-bottom: 24px; }

    /* ── Call Overlay ────────────────────────────── */
    #call-overlay {
      position: fixed; inset: 0; background: #0a0a10; z-index: 200;
      display: none; flex-direction: column;
    }
    #call-overlay.visible { display: flex; }
    .call-videos { flex: 1; position: relative; background: #000; overflow: hidden; }
    #remote-video { width: 100%; height: 100%; object-fit: cover; }
    #local-video {
      position: absolute; bottom: 16px; right: 16px;
      width: 110px; height: 80px; border-radius: 10px; object-fit: cover;
      background: #222; border: 2px solid var(--border);
    }
    .call-info {
      position: absolute; top: calc(16px + var(--safe-top)); left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.6); padding: 6px 18px; border-radius: 999px; text-align: center; white-space: nowrap;
    }
    .call-peer-name { font-size: .95rem; font-weight: 700; }
    .call-status { font-size: .72rem; color: var(--text2); margin-top: 2px; }
    .call-controls {
      background: rgba(15,15,20,.95); padding: 16px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 16px;
      padding-bottom: calc(16px + var(--safe-bottom));
    }
    .call-ctrl-btn {
      width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
      transition: all .2s; background: var(--bg4); color: var(--text);
    }
    .call-ctrl-btn:hover { filter: brightness(1.2); }
    .call-ctrl-btn.active { background: var(--accent); }
    .call-ctrl-btn.end { background: var(--danger); color: #fff; width: 60px; height: 60px; font-size: 1.4rem; }

    /* ── Toast ───────────────────────────────────── */
    .toast {
      position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 18px; font-size: .85rem; color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,.4); transition: transform .3s; z-index: 300;
      white-space: nowrap; max-width: calc(100vw - 32px); text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .toast.warn { border-color: var(--warn); color: var(--warn); }

    #file-input { display: none; }

    /* ── Scrollbar ───────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

    /* ════════════════════════════════════════════════
       RESPONSIVE — Tablet (≤ 900px)
    ════════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .members-panel { display: none; }
      .btn-members-toggle { display: flex; }
    }

    /* ════════════════════════════════════════════════
       RESPONSIVE — Mobile (≤ 640px)
    ════════════════════════════════════════════════ */
    @media (max-width: 640px) {
      :root { --sidebar-w: 280px; }

      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        transform: translateX(-100%); z-index: 50;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-close { display: flex; }

      .hamburger { display: flex; }

      .chat-header-code { display: none; }

      .msg { max-width: 88%; }
      .msg-image { max-width: 200px; }

      .chat-input-area { padding: 8px 10px; padding-bottom: calc(8px + var(--safe-bottom)); }

      #local-video { width: 90px; height: 66px; }
    }
  </style>
</head>
<body>

<!-- ── Auth Screen ─────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>Steroid</h1>
      <p>Chat &amp; call anyone, by code.</p>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Log In</div>
      <div class="auth-tab" data-tab="register">Sign Up</div>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <form id="login-form" autocomplete="on">
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required /></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required /></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ══════════════════════════════════════════════════
//  Mobile viewport height fix
// ══════════════════════════════════════════════════
function setVH() {
  document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
}
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', () => setTimeout(setVH, 150));
setVH();

// ══════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════
const state = {
  token: localStorage.getItem('steroid_token'),
  user: JSON.parse(localStorage.getItem('steroid_user') || 'null'),
  rooms: [],
  currentRoom: null,
  socket: null,
  pendingFile: null,
  pendingLink: null,
  onlineUsers: [],
};

const rtc = {
  peer: null, localStream: null,
  remoteUserId: null, remoteUsername: null,
  pendingOffer: null, micMuted: false, camOff: false,
};

const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
  ],
};

// ══════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════
async function api(method, path, body, isForm = false) {
  const headers = {};
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  if (body && !isForm) headers['Content-Type'] = 'application/json';
  const res = await fetch(`/api${path}`, {
    method, headers,
    body: isForm ? body : (body ? JSON.stringify(body) : undefined),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || 'Request failed');
  return data;
}

// ══════════════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════════════
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ══════════════════════════════════════════════════
//  Sidebar (mobile drawer)
// ══════════════════════════════════════════════════
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}

document.getElementById('hamburger').addEventListener('click', openSidebar);
document.getElementById('sidebar-close').addEventListener('click', closeSidebar);
document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

const hamburgerEmpty = document.getElementById('hamburger-empty');
hamburgerEmpty.addEventListener('click', openSidebar);
function updateHamburgerEmpty() {
  hamburgerEmpty.style.display = window.innerWidth <= 640 && !state.currentRoom ? 'flex' : 'none';
}
window.addEventListener('resize', updateHamburgerEmpty);

// ══════════════════════════════════════════════════
//  Members sheet (mobile)
// ══════════════════════════════════════════════════
document.getElementById('btn-members-toggle').addEventListener('click', () => {
  if (window.innerWidth <= 900) {
    renderMembersSheet(state.onlineUsers);
    document.getElementById('members-sheet').classList.add('visible');
  }
});
document.getElementById('members-sheet-backdrop').addEventListener('click', () => {
  document.getElementById('members-sheet').classList.remove('visible');
});

function renderMembersSheet(users) {
  const list = document.getElementById('members-sheet-list');
  document.getElementById('sheet-online-count').textContent = users.length;
  list.innerHTML = users.length ? users.map(u => memberHTML(u)).join('') : '<div class="members-empty">No one online yet</div>';
  list.querySelectorAll('.call-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('members-sheet').classList.remove('visible');
      startCall(+btn.dataset.id, btn.dataset.name);
    });
  });
}

// ══════════════════════════════════════════════════
//  Auth
// ══════════════════════════════════════════════════
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const w = tab.dataset.tab;
    document.getElementById('login-form').style.display    = w === 'login'    ? '' : 'none';
    document.getElementById('register-form').style.display = w === 'register' ? '' : 'none';
    document.getElementById('auth-error').style.display = 'none';
  });
});

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display = 'block';
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  try {
    onLogin(await api('POST', '/auth/login', {
      email: document.getElementById('login-email').value,
      password: document.getElementById('login-password').value,
    }));
  } catch (err) { showAuthError(err.message); }
});

document.getElementById('register-form').addEventListener('submit', async e => {
  e.preventDefault();
  try {
    onLogin(await api('POST', '/auth/register', {
      username: document.getElementById('reg-username').value,
      email: document.getElementById('reg-email').value,
      password: document.getElementById('reg-password').value,
    }));
  } catch (err) { showAuthError(err.message); }
});

function onLogin({ token, user }) {
  state.token = token; state.user = user;
  localStorage.setItem('steroid_token', token);
  localStorage.setItem('steroid_user', JSON.stringify(user));
  showApp();
}

document.getElementById('btn-logout').addEventListener('click', async () => {
  try { await api('POST', '/auth/logout'); } catch {}
  state.token = null; state.user = null; state.rooms = []; state.currentRoom = null;
  localStorage.removeItem('steroid_token'); localStorage.removeItem('steroid_user');
  if (state.socket) { state.socket.disconnect(); state.socket = null; }
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display = 'flex';
  showEmptyState();
});

// ══════════════════════════════════════════════════
//  App init
// ══════════════════════════════════════════════════
async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-name').textContent = state.user.username;
  document.getElementById('user-avatar').textContent = state.user.username[0].toUpperCase();
  if (state.user.is_admin) document.getElementById('user-tag').textContent = '👑 Admin';
  updateHamburgerEmpty();
  connectSocket();
  await loadRooms();
}

if (state.token && state.user) {
  showApp().catch(() => {
    localStorage.removeItem('steroid_token');
    localStorage.removeItem('steroid_user');
  });
}

// ══════════════════════════════════════════════════
//  Socket.IO
// ══════════════════════════════════════════════════
function connectSocket() {
  state.socket = io({ auth: { token: state.token } });

  state.socket.on('message', msg => {
    if (state.currentRoom && msg.room_id === state.currentRoom.id) {
      appendMessage(msg); scrollToBottom();
    }
  });

  state.socket.on('room-online-users', users => {
    state.onlineUsers = users;
    renderMembersPanel(users);
  });

  state.socket.on('incoming-call', ({ from, offer }) => {
    rtc.remoteUserId = from.id; rtc.remoteUsername = from.username; rtc.pendingOffer = offer;
    document.getElementById('incoming-caller-name').textContent = from.username;
    document.getElementById('incoming-call-modal').classList.add('visible');
  });

  state.socket.on('call-accepted', async ({ answer }) => {
    if (!rtc.peer) return;
    await rtc.peer.setRemoteDescription(new RTCSessionDescription(answer));
    document.getElementById('call-status').textContent = 'Connected';
  });

  state.socket.on('call-declined', ({ username }) => { endCall(); showToast(`${username} declined the call`, 'warn'); });
  state.socket.on('call-ended',    ({ username }) => { endCall(); showToast(`${username} ended the call`); });
  state.socket.on('call-unavailable', () => { endCall(); showToast('User is not available', 'warn'); });

  state.socket.on('ice-candidate', async ({ candidate }) => {
    if (rtc.peer && candidate) {
      try { await rtc.peer.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
    }
  });
}

// ══════════════════════════════════════════════════
//  Rooms
// ══════════════════════════════════════════════════
async function loadRooms() {
  try { state.rooms = await api('GET', '/rooms'); renderRoomList(); } catch {}
}

function renderRoomList() {
  const list = document.getElementById('room-list');
  if (!state.rooms.length) {
    list.innerHTML = '<div style="padding:10px 16px;font-size:.82rem;color:var(--text2)">No rooms yet</div>';
    return;
  }
  list.innerHTML = state.rooms.map(r => `
    <div class="room-item ${state.currentRoom?.id === r.id ? 'active' : ''}" data-id="${r.id}">
      <span>🔊</span>
      <div style="flex:1;min-width:0">
        <div class="room-name">${esc(r.name)}</div>
        <div class="room-code-label">${r.code}</div>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.room-item').forEach(el => {
    el.addEventListener('click', () => {
      const room = state.rooms.find(r => r.id === +el.dataset.id);
      if (room) { openRoom(room); closeSidebar(); }
    });
  });
}

async function openRoom(room) {
  if (state.currentRoom?.id === room.id) return;
  if (state.currentRoom && state.socket) state.socket.emit('leave-room', state.currentRoom.code);

  state.currentRoom = room;
  renderRoomList();
  if (state.socket) state.socket.emit('join-room', room.code);

  document.getElementById('empty-state').style.display = 'none';
  const ac = document.getElementById('active-chat');
  ac.style.display = 'flex'; ac.style.flexDirection = 'column';

  if (window.innerWidth > 900) {
    document.getElementById('members-panel').style.display = 'flex';
  }

  document.getElementById('chat-room-name').textContent = room.name;
  document.getElementById('chat-room-code').textContent = room.code;
  document.getElementById('chat-room-members').textContent = `${room.member_count} member${room.member_count !== 1 ? 's' : ''}`;

  document.getElementById('messages').innerHTML = '';
  updateHamburgerEmpty();
  await loadMessages(room.code);
  scrollToBottom();
}

// ══════════════════════════════════════════════════
//  Messages
// ══════════════════════════════════════════════════
async function loadMessages(code) {
  try {
    const msgs = await api('GET', `/rooms/${code}/messages`);
    const container = document.getElementById('messages');
    container.innerHTML = '';
    let lastDate = null;
    msgs.forEach(msg => {
      const d = new Date(msg.created_at).toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
      if (d !== lastDate) {
        lastDate = d;
        const div = document.createElement('div');
        div.className = 'day-divider'; div.textContent = d;
        container.appendChild(div);
      }
      appendMessage(msg);
    });
  } catch { showToast('Failed to load messages', 'error'); }
}

function appendMessage(msg) {
  const container = document.getElementById('messages');
  const isOwn = msg.user_id === state.user.id;
  const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  let contentHtml = '';
  if (msg.type === 'image') {
    contentHtml = `<img class="msg-image" src="${esc(msg.file_url)}" alt="${esc(msg.file_name||'image')}" onclick="openLightbox('${esc(msg.file_url)}')" loading="lazy" />`;
    if (msg.content) contentHtml += `<div class="msg-text" style="margin-top:6px">${esc(msg.content)}</div>`;
  } else if (msg.type === 'file') {
    contentHtml = `<a class="msg-file" href="${esc(msg.file_url)}" download="${esc(msg.file_name||'file')}" target="_blank">
      <span class="msg-file-icon">📄</span><span class="msg-file-name">${esc(msg.file_name||'Download file')}</span></a>`;
    if (msg.content) contentHtml += `<div class="msg-text" style="margin-top:6px">${esc(msg.content)}</div>`;
  } else if (msg.type === 'link') {
    contentHtml = `<a class="msg-link" href="${esc(msg.file_url)}" target="_blank" rel="noopener">🔗 ${esc(msg.content||msg.file_url)}</a>`;
  } else {
    contentHtml = `<div class="msg-text">${linkify(esc(msg.content||''))}</div>`;
  }

  const el = document.createElement('div');
  el.className = `msg ${isOwn ? 'own' : 'other'}`;
  el.innerHTML = `
    <div class="msg-avatar" style="background:${strColor(msg.username)}">${msg.username[0].toUpperCase()}</div>
    <div>
      ${!isOwn ? `<div class="msg-username">${esc(msg.username)}</div>` : ''}
      <div class="msg-bubble">${contentHtml}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  container.appendChild(el);
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// ══════════════════════════════════════════════════
//  Send message
// ══════════════════════════════════════════════════
async function sendMessage() {
  if (!state.currentRoom) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !state.pendingFile && !state.pendingLink) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  try {
    if (state.pendingFile) {
      const fd = new FormData();
      fd.append('file', state.pendingFile);
      if (text) fd.append('content', text);
      await api('POST', `/rooms/${state.currentRoom.code}/messages`, fd, true);
      clearAttachment();
    } else if (state.pendingLink) {
      await api('POST', `/rooms/${state.currentRoom.code}/messages`, {
        type: 'link', link_url: state.pendingLink.url, content: state.pendingLink.label || state.pendingLink.url,
      });
      clearAttachment();
    } else {
      await api('POST', `/rooms/${state.currentRoom.code}/messages`, { content: text, type: 'text' });
    }
    input.value = ''; input.style.height = '';
  } catch (err) { showToast(err.message, 'error'); }
  finally { btn.disabled = false; input.focus(); }
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 640) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ══════════════════════════════════════════════════
//  Attachments
// ══════════════════════════════════════════════════
document.getElementById('btn-attach-file').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  state.pendingFile = file; state.pendingLink = null;
  document.getElementById('attachment-icon').textContent = file.type.startsWith('image/') ? '🖼️' : '📄';
  document.getElementById('attachment-name').textContent = file.name;
  document.getElementById('attachment-preview').classList.add('visible');
  e.target.value = '';
});
document.getElementById('attachment-remove').addEventListener('click', clearAttachment);
function clearAttachment() {
  state.pendingFile = null; state.pendingLink = null;
  document.getElementById('attachment-preview').classList.remove('visible');
}

document.getElementById('btn-attach-link').addEventListener('click', () => {

document.getElementById('modal-join-confirm').addEventListener('click', async () => {
  const code = document.getElementById('join-code-input').value.trim().toUpperCase(); if (!code) return;
  try {
    const room = await api('POST', `/rooms/${code}/join`);
    document.getElementById('modal-join').classList.remove('visible');
    if (!state.rooms.find(r => r.id === room.id)) state.rooms.unshift(room);
    renderRoomList(); openRoom(room); closeSidebar();
    showToast(`Joined ${room.name}!`, 'success');
  } catch (err) { showToast(err.message, 'error'); }
});
document.getElementById('join-code-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('modal-join-confirm').click(); });

document.getElementById('btn-create-room').addEventListener('click', () => {
  document.getElementById('create-room-name').value = '';
  document.getElementById('modal-create').classList.add('visible');

});

// ══════════════════════════════════════════════════
//  Members panel
// ══════════════════════════════════════════════════
function memberHTML(u) {
  return `<div class="member-item">
    <div class="member-avatar" style="background:${strColor(u.username)}">${u.username[0].toUpperCase()}</div>
    <span class="member-name">${esc(u.username)}</span>
    ${u.id === state.user.id
      ? '<span class="member-you">you</span>'
      : `<button class="call-btn" data-id="${u.id}" data-name="${esc(u.username)}" title="Call ${esc(u.username)}">📞</button>`}
  </div>`;
}

function renderMembersPanel(users) {
  document.getElementById('online-count').textContent = users.length;
  const list = document.getElementById('members-list');
  list.innerHTML = users.length ? users.map(memberHTML).join('') : '<div class="members-empty">No one online yet</div>';
  list.querySelectorAll('.call-btn').forEach(btn => {
    btn.addEventListener('click', () => startCall(+btn.dataset.id, btn.dataset.name));
  });
}

// ══════════════════════════════════════════════════
//  WebRTC Calling
// ══════════════════════════════════════════════════
async function startCall(targetUserId, targetUsername) {
  if (rtc.peer) return showToast('Already in a call', 'warn');
  rtc.remoteUserId = targetUserId; rtc.remoteUsername = targetUsername;
  try {
    rtc.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true })
      .catch(() => navigator.mediaDevices.getUserMedia({ audio: true, video: false }));
  } catch { return showToast('Could not access mic/camera', 'error'); }

  showCallOverlay(targetUsername, 'Calling…');
  rtc.peer = createPeer(targetUserId);
  rtc.localStream.getTracks().forEach(t => rtc.peer.addTrack(t, rtc.localStream));
  const offer = await rtc.peer.createOffer();
  await rtc.peer.setLocalDescription(offer);
  state.socket.emit('call-request', { targetUserId, offer });
}

document.getElementById('btn-accept-call').addEventListener('click', async () => {
  document.getElementById('incoming-call-modal').classList.remove('visible');
  try {
    rtc.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true })
      .catch(() => navigator.mediaDevices.getUserMedia({ audio: true, video: false }));
  } catch { return showToast('Could not access mic/camera', 'error'); }

  showCallOverlay(rtc.remoteUsername, 'Connected');
  rtc.peer = createPeer(rtc.remoteUserId);
  rtc.localStream.getTracks().forEach(t => rtc.peer.addTrack(t, rtc.localStream));
  await rtc.peer.setRemoteDescription(new RTCSessionDescription(rtc.pendingOffer));
  const answer = await rtc.peer.createAnswer();
  await rtc.peer.setLocalDescription(answer);
  state.socket.emit('call-accepted', { targetUserId: rtc.remoteUserId, answer });
});

document.getElementById('btn-decline-call').addEventListener('click', () => {
  state.socket.emit('call-declined', { targetUserId: rtc.remoteUserId });
  document.getElementById('incoming-call-modal').classList.remove('visible');
  rtc.remoteUserId = null; rtc.remoteUsername = null; rtc.pendingOffer = null;
});

function createPeer(targetUserId) {
  const peer = new RTCPeerConnection(ICE_SERVERS);
  peer.onicecandidate = ({ candidate }) => {
    if (candidate) state.socket.emit('ice-candidate', { targetUserId, candidate });
  };
  peer.ontrack = ({ streams }) => {
    document.getElementById('remote-video').srcObject = streams[0];
    document.getElementById('call-status').textContent = 'Connected';
  };
  peer.onconnectionstatechange = () => {
    if (peer.connectionState === 'failed' || peer.connectionState === 'disconnected') {
      endCall(); showToast('Call disconnected', 'warn');
    }
  };
  return peer;
}

function showCallOverlay(name, status) {
  document.getElementById('call-peer-name').textContent = name;
  document.getElementById('call-status').textContent = status;
  document.getElementById('call-overlay').classList.add('visible');
  if (rtc.localStream) document.getElementById('local-video').srcObject = rtc.localStream;
}

function endCall() {
  if (rtc.peer) { rtc.peer.close(); rtc.peer = null; }
  if (rtc.localStream) { rtc.localStream.getTracks().forEach(t => t.stop()); rtc.localStream = null; }
  document.getElementById('remote-video').srcObject = null;
  document.getElementById('local-video').srcObject = null;
  rtc.remoteUserId = null; rtc.remoteUsername = null; rtc.pendingOffer = null;
  rtc.micMuted = false; rtc.camOff = false;
  document.getElementById('btn-toggle-mic').textContent = '🎤';
  document.getElementById('btn-toggle-cam').textContent = '📹';
  document.getElementById('call-overlay').classList.remove('visible');
}

document.getElementById('btn-end-call').addEventListener('click', () => {
  if (rtc.remoteUserId) state.socket.emit('call-ended', { targetUserId: rtc.remoteUserId });
  endCall();
});
document.getElementById('btn-toggle-mic').addEventListener('click', function () {
  if (!rtc.localStream) return;
  rtc.micMuted = !rtc.micMuted;
  rtc.localStream.getAudioTracks().forEach(t => t.enabled = !rtc.micMuted);
  this.textContent = rtc.micMuted ? '🔇' : '🎤';
  this.classList.toggle('active', rtc.micMuted);
});
document.getElementById('btn-toggle-cam').addEventListener('click', function () {
  if (!rtc.localStream) return;
  rtc.camOff = !rtc.camOff;
  rtc.localStream.getVideoTracks().forEach(t => t.enabled = !rtc.camOff);
  this.textContent = rtc.camOff ? '🚫' : '📹';
  this.classList.toggle('active', rtc.camOff);
});

// ══════════════════════════════════════════════════
//  Utils
// ══════════════════════════════════════════════════
function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function linkify(text) {
  return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent2)">$1</a>');
}
function strColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${Math.abs(h) % 360},55%,35%)`;
}
